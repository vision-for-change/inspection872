<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — 872 Squadron</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-badge">
        <div class="badge-number-lg">872</div>
        <div class="badge-text-lg">
          <div>KIWANIS KANATA</div>
          <div>SQUADRON</div>
        </div>
      </div>
      <h2 class="login-title">Inspection System</h2>
      <p class="login-sub">Authorized Personnel Only</p>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-input" placeholder="Enter inspector password" autofocus required>
        </div>
        <button type="submit" class="btn-primary btn-full">Access System</button>
      </form>
    </div>
  </div>
</body>
</html>
